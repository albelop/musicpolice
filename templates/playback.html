<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI Playback - MusicPolice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Tone.js for audio synthesis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- MIDI parser -->
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.min.js"></script>
    <style>
        :root {
            --piano-white-key: #f8f8f8;
            --piano-black-key: #1a1a1a;
            --piano-white-active: #4ecdc4;
            --piano-black-active: #45b7aa;
            --note-color: rgba(78, 205, 196, 0.85);
            --note-active-color: rgba(233, 69, 96, 0.95);
            --playhead-color: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
        }

        .playback-container {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }

        .playback-header {
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--pico-card-background-color);
            border-bottom: 2px solid var(--pico-border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        .playback-mode-switch {
            display: flex;
            gap: 0;
            background: var(--bg-card);
            border-radius: 6px;
            padding: 4px;
            border: 1px solid var(--pico-border-color);
        }

        .playback-mode-switch input[type="radio"] {
            display: none;
        }

        .playback-mode-switch label {
            padding: 6px 14px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin: 0;
            white-space: nowrap;
            color: var(--pico-color);
        }

        .playback-mode-switch input[type="radio"]:checked + label {
            background: var(--accent);
            color: white;
            font-weight: 600;
        }

        .playback-mode-switch label:hover {
            background: var(--bg-primary);
        }

        .playback-mode-switch input[type="radio"]:checked + label:hover {
            background: var(--accent-hover);
        }

        .playback-title-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .visualizer-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
            background: #0d1117;
        }

        .piano-roll-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        #piano-roll-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .piano-keyboard-container {
            flex-shrink: 0;
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border-top: 2px solid #333;
            position: relative;
        }

        #piano-keyboard-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .playback-controls-bar {
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--pico-card-background-color);
            border-top: 2px solid var(--pico-border-color);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            flex-shrink: 0;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .time-display {
            font-variant-numeric: tabular-nums;
            min-width: 110px;
            font-size: 1rem;
            text-align: center;
        }

        .control-buttons {
            display: flex;
            gap: var(--spacing-xs);
        }

        .control-buttons .btn {
            padding: 8px 16px;
            min-width: 44px;
        }

        .progress-container {
            flex: 1;
            min-width: 100px;
        }

        .progress-bar-playback {
            height: 8px;
            background: var(--bg-card);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--pico-border-color);
            position: relative;
        }

        .progress-bar-playback:hover {
            height: 12px;
        }

        .progress-fill-playback {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            width: 0%;
            transition: width 0.05s linear;
            box-shadow: 0 0 8px rgba(233, 69, 96, 0.5);
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 17, 23, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--pico-border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: var(--accent);
            text-align: center;
            padding: var(--spacing-xl);
            font-size: 1.2rem;
        }

        .error-message.hidden {
            display: none;
        }

        /* Responsive styles */
        @media (max-width: 768px) {
            .playback-header {
                flex-direction: column;
                gap: var(--spacing-sm);
                align-items: stretch;
                padding: var(--spacing-sm) var(--spacing-md);
            }

            .playback-title-text {
                font-size: 1rem;
                text-align: center;
            }

            .playback-mode-switch {
                justify-content: center;
            }

            .playback-mode-switch label {
                padding: 4px 10px;
                font-size: 0.8rem;
            }

            .playback-controls-bar {
                padding: var(--spacing-sm) var(--spacing-md);
            }

            .controls-row {
                flex-wrap: wrap;
                justify-content: center;
                gap: var(--spacing-sm);
            }

            .time-display {
                order: 1;
                font-size: 0.9rem;
                min-width: 100px;
            }

            .control-buttons {
                order: 0;
                justify-content: center;
            }

            .progress-container {
                order: 2;
                width: 100%;
                flex: none;
            }

            .piano-keyboard-container {
                min-height: 60px;
            }
        }

        @media (min-width: 769px) {
            .piano-keyboard-container {
                min-height: 80px;
                max-height: 100px;
            }
        }

        @media (max-width: 480px) {
            .playback-mode-switch label {
                padding: 4px 8px;
                font-size: 0.75rem;
            }

            .control-buttons .btn {
                padding: 6px 12px;
                min-width: 40px;
                font-size: 0.9rem;
            }

            .piano-keyboard-container {
                min-height: 50px;
            }
        }

        /* Touch-friendly adjustments */
        @media (hover: none) and (pointer: coarse) {
            .progress-bar-playback {
                height: 16px;
            }
            
            .progress-bar-playback:hover {
                height: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="playback-container">
        <!-- Header -->
        <div class="playback-header">
            <h1 class="playback-title-text" id="file-title">Loading...</h1>
            <div class="playback-mode-switch">
                <input type="radio" id="mode-browser" name="playback-mode" value="browser" checked>
                <label for="mode-browser">🔊 Browser</label>
                
                <input type="radio" id="mode-piano" name="playback-mode" value="piano">
                <label for="mode-piano">🎹 Piano</label>
                
                <input type="radio" id="mode-both" name="playback-mode" value="both">
                <label for="mode-both">🔊🎹 Both</label>
            </div>
            <a href="/" role="button" class="btn">← Back</a>
        </div>

        <!-- Visualizer -->
        <div class="visualizer-wrapper">
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
                <p style="margin-top: var(--spacing-md); text-align: center;">Loading MIDI file...</p>
            </div>
            <div class="error-message hidden" id="error-message"></div>
            
            <!-- Piano Roll Canvas -->
            <div class="piano-roll-container" id="piano-roll-container">
                <canvas id="piano-roll-canvas"></canvas>
            </div>
            
            <!-- Piano Keyboard -->
            <div class="piano-keyboard-container" id="piano-keyboard-container">
                <canvas id="piano-keyboard-canvas"></canvas>
            </div>
        </div>

        <!-- Controls -->
        <div class="playback-controls-bar">
            <div class="controls-row">
                <div class="control-buttons">
                    <button class="btn btn-control" id="btn-rewind" title="Rewind 5s">⏪</button>
                    <button class="btn btn-control" id="btn-restart" title="Restart">⏮</button>
                    <button class="btn btn-control btn-primary" id="btn-play-pause" title="Play/Pause">▶</button>
                    <button class="btn btn-control" id="btn-stop" title="Stop">⏹</button>
                </div>
                <div class="time-display" id="time-display">0:00 / 0:00</div>
                <div class="progress-container">
                    <div class="progress-bar-playback" id="progress-bar">
                        <div class="progress-fill-playback" id="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/playback-page.js"></script>
</body>
</html>
